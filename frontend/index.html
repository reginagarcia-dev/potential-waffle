<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#030b14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="ArqLift — Track every rep, set, and PR. A premium workout logging experience." />
    <meta name="apple-mobile-web-app-title" content="ArqLift" />
    <title>ArqLift</title>
    <link rel="canonical" href="https://www.arqlift.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Static fallback for crawlers/scrapers that don't execute JS (social
         link previews, some search bots). Client-side routes override these
         via useSeo() (frontend/src/lib/seo.ts) once React mounts. -->
    <meta property="og:site_name" content="ArqLift" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.arqlift.com/" />
    <meta property="og:title" content="ArqLift — Track every rep, set, and PR." />
    <meta property="og:description" content="ArqLift keeps your workouts focused and your progress measurable. Capture sets, session notes, and long-term trends with a workflow that feels fast inside the gym." />
    <meta property="og:image" content="https://www.arqlift.com/apple-touch-icon.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArqLift — Track every rep, set, and PR." />
    <meta name="twitter:description" content="ArqLift keeps your workouts focused and your progress measurable. Capture sets, session notes, and long-term trends with a workflow that feels fast inside the gym." />
    <meta name="twitter:image" content="https://www.arqlift.com/apple-touch-icon.png" />

    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-black text-gray-100 antialiased selection:bg-teal-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
